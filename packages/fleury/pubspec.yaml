name: fleury
description: A Dart-native terminal UI framework with Flutter ergonomics and terminal-native internals.
version: 0.1.0
repository: https://github.com/danReynolds/fleury
issue_tracker: https://github.com/danReynolds/fleury/issues
topics:
  - terminal
  - tui
  - ui
  - framework
  - cli

executables:
  fleury: fleury

environment:
  sdk: ^3.10.4

dependencies:
  characters: ^1.4.0
  ffi: ^2.1.4
  meta: ^1.17.0
  # fd-level (dup2) stdout/stderr capture for the native runtime: stray output
  # from native/FFI libraries (which zones and IOOverrides cannot see) is kept
  # off the terminal so it can't corrupt rendered frames. POSIX-only at
  # runtime; never imported by the web-safe barrels.
  stdio: ^0.4.0
  vm_service: ^15.0.2
  # Recursive, rename-aware source watching for dev-time hot reload (Linux
  # inotify is not natively recursive; this is the dart-lang watcher used by
  # the wider ecosystem's reload tooling). Never imported by web-safe barrels.
  watcher: ^1.1.4

dev_dependencies:
  benchmark_harness: ^2.3.1
  lints: ^6.0.0
  matcher: ^0.12.16
  test: ^1.26.3
