# Tag config: `integration`-tagged tests spawn real processes and
# take seconds rather than milliseconds ‚Äî they're allowed but run on
# request. Use `dart test -t integration` to include them or
# `dart test -x integration` to exclude them.

tags:
  integration:
    timeout: 30s
  # Needs a real PTY (openpty): fails in sandboxed shells / most CI.
  # Exclude with `dart test -x pty`.
  pty:
    timeout: 30s
  coverage-incompatible:
    timeout: 30s
