  <title>fleury DomGridSurface vs xterm.js render benchmark</title>

  <script src="vendor/xterm.js"></script>
  <script src="vendor/addon-canvas.js"></script>
  <script src="vendor/addon-webgl.js"></script>
  <script>
    // The addon UMD bundles expose either the class or a { ClassName } namespace
    // as a global; normalize each to its constructor for the Dart interop.
    (function (g) {
      function ctor(name) {
        var v = g[name];
        return v && v[name] ? v[name] : v;
      }
      g._CanvasAddon = ctor('CanvasAddon');
      g._WebglAddon = ctor('WebglAddon');
    })(window);
  </script>
  <link rel="x-dart-test" href="xterm_vs_fleury_bench_test.dart">
  <script src="packages/test/dart.js"></script>
