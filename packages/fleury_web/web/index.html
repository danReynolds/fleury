<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>fleury · web</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/css/xterm.css"
  />
  <style>
    html, body { margin: 0; height: 100%; background: #0b0e14; }
    #terminal { height: 100vh; padding: 8px; box-sizing: border-box; }
  </style>
</head>
<body>
  <div id="terminal"></div>

  <!-- xterm.js + fit addon (UMD globals: Terminal, FitAddon). -->
  <script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10/lib/addon-fit.js"></script>

  <!-- Create the terminal and expose it where the Dart driver looks for it.
       Runs during parsing, before the deferred main.dart.js. -->
  <script>
    const term = new Terminal({
      cursorBlink: false,
      fontFamily: 'Menlo, Consolas, "DejaVu Sans Mono", monospace',
      fontSize: 14,
      theme: { background: '#0b0e14', foreground: '#c8d3e0' },
    });
    const fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(document.getElementById('terminal'));
    fitAddon.fit();
    globalThis.fleuryTerminal = term;
    window.addEventListener('resize', () => fitAddon.fit());
    term.focus();
  </script>

  <script defer src="main.dart.js"></script>
</body>
</html>
