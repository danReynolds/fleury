name: fleury_mcp
description: >-
  A Model Context Protocol server that drives a Fleury terminal-UI app through
  its semantic tree, so any MCP host can read and operate it.
version: 0.1.0
repository: https://github.com/danReynolds/fleury/tree/main/packages/fleury_mcp
issue_tracker: https://github.com/danReynolds/fleury/issues
topics:
  - mcp
  - agents
  - tui
  - terminal
  - automation

executables:
  fleury_mcp: fleury_mcp

environment:
  sdk: ^3.10.4

dependencies:
  # Depends on fleury's PUBLIC host SPI (fleury_host_io.dart) — safe under
  # semver. pubspec_overrides.yaml resolves it from the monorepo during
  # development; pub ignores that file when publishing.
  fleury: ^0.1.0
  # Grapheme-cluster counting for press_key, matching how fleury core treats
  # user-typed text (input_dispatcher / text_editing).
  characters: ^1.4.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.26.3
