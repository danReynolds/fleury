name: docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: 3.12.2
      - name: Resolve Dart documentation examples
        working-directory: website/examples
        run: dart pub get
      - name: Build GitHub Pages artifact
        uses: withastro/action@v6
        with:
          path: website
          node-version: 24
          package-manager: npm

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
