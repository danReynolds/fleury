name: fleury_profiling
description: TUI profiling harness — capture (dart:ffi pty) + analyze (AnsiByteBreakdown) for fleury and peers. Not shipped.
publish_to: none
environment:
  sdk: ^3.6.0
dependencies:
  fleury:
    path: ../packages/fleury
  fleury_widgets:
    path: ../packages/fleury_widgets
  ffi: ^2.1.0
  vm_service: ^15.0.0
dev_dependencies:
  # The low-level fleury_test_support barrel intentionally has no test-runner
  # dependency; package:test is used only by this harness's own tests.
  test: ^1.26.3
