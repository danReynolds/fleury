name: fleury_profiling
description: TUI profiling harness — capture (dart:ffi pty) + analyze (AnsiByteBreakdown) for fleury and peers. Not shipped.
publish_to: none
environment:
  sdk: ^3.6.0
dependencies:
  fleury:
    path: ../packages/fleury
  fleury_widgets:
    path: ../packages/fleury_widgets
  ffi: ^2.1.0
  vm_service: ^15.0.0
dev_dependencies:
  # bin/paint_gate.dart imports `package:fleury/fleury_test.dart` — the only
  # export point of the repaint-boundary debug counters and the fake
  # clock/scheduler — and that barrel imports package:test, so it must
  # resolve in this package's graph. Dev (not regular) on purpose: `dart run`
  # resolves the root package's dev deps for bin/, and a regular dep would
  # needlessly widen the solve surface of this never-published harness.
  test: ^1.26.3
